<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Idle Clicker</title>
    <link rel="stylesheet" href="Styles/login.css">
</head>
<body>
    <!-- LOGIN FORM -->
    <form id="loginForm" method="POST" action="php/connect.php">
        <ul>
            <!-- EMAIL -->
            <div id="emailInput">       
                <li><label for="username">Email:</label></li> 
                <li><input type="text" id="email" name="email"></li>  
            </div> 
            <!-- USERNAME -->
            <div id="usernameInput">       
                <li><label for="username">Username:</label></li> 
                <li><input type="text" id="username" name="username"></li>  
            </div> 
            <!-- PASSWORD -->
            <div id="passwordInput">
                <li><label for="password">Password:</label></li>
                <li><input type="password" id="password" name="password"></li>
            </div>
            <!-- CONFIRM PASSWORD -->
            <div id="passwordConfirm">
                <li><label for="confirm">Confirm Password:</label></li>
                <li><input type="password" id="confirm" name="confirm"></li>
            </div>

            <!-- SUBMIT BUTTON -->
            <button>Submit</button>
        </ul>
    </form>
</body>
</html>
